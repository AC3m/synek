project_id = "synek"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:5173"
additional_redirect_urls = ["http://127.0.0.1:5173"]
jwt_expiry = 3600
enable_signup = true

[edge_runtime]
enabled = true
policy = "oneshot"

[functions.strava-webhook]
verify_jwt = false

[functions.strava-token-refresh]
verify_jwt = false

[functions.strava-sync]
verify_jwt = false

[functions.junction-create-user]
verify_jwt = false

[functions.junction-disconnect]
verify_jwt = false

[functions.junction-webhook]
verify_jwt = false

[functions.submit-support]
verify_jwt = false

